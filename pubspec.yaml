name: routine_ready
description: "Visual classroom routine display app for children"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  lucide_icons: ^0.257.0
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.6.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: TwinklCursiveLooped
      fonts:
        - asset: assets/fonts/TwinklCursiveLooped-Thin.ttf
          weight: 100
        - asset: assets/fonts/TwinklCursiveLooped-Light.ttf
          weight: 300
        - asset: assets/fonts/TwinklCursiveLooped-Regular.ttf
          weight: 400
        - asset: assets/fonts/TwinklCursiveLooped-Semibold.ttf
          weight: 600
        - asset: assets/fonts/TwinklCursiveLooped-Bold.ttf
          weight: 700
    - family: TwinklCursiveUnlooped
      fonts:
        - asset: assets/fonts/TwinklCursiveUnlooped-Thin.ttf
          weight: 100
        - asset: assets/fonts/TwinklCursiveUnlooped-Light.ttf
          weight: 300
        - asset: assets/fonts/TwinklCursiveUnlooped-Regular.ttf
          weight: 400
        - asset: assets/fonts/TwinklCursiveUnlooped-Semibold.ttf
          weight: 600
        - asset: assets/fonts/TwinklCursiveUnlooped-Bold.ttf
          weight: 700
    - family: TwinklPrecursive
      fonts:
        - asset: assets/fonts/TwinklPrecursive-Thin.ttf
          weight: 100
        - asset: assets/fonts/TwinklPrecursive-Light.ttf
          weight: 300
        - asset: assets/fonts/TwinklPrecursive-Regular.ttf
          weight: 400
        - asset: assets/fonts/TwinklPrecursive-Semibold.ttf
          weight: 600
        - asset: assets/fonts/TwinklPrecursive-Bold.ttf
          weight: 700
